        .budget-input { flex: 2; padding: 10px 16px; border-radius: 60px; border: 1px solid #cbd5e1; }

        .footer { text-align: center; margin-top: 1rem; font-size: 0.7rem; color: #64748b; }

<script>

    // ВСЕ ПРОЦЕССОРЫ
    const CPU_DB = [
        "Intel Celeron", "Intel Pentium", "Intel Core 2 Duo", "Intel Core 2 Quad",
        "Intel Core i3-2100", "i3-3220", "i3-4130", "i3-6100", "i3-7100", "i3-8100", "i3-9100", "i3-9100F", "i3-10100", "i3-10100F", "i3-12100", "i3-12100F",

        "AMD Ryzen 7 1700", "Ryzen 7 2700X", "Ryzen 7 3700X", "Ryzen 7 5700X", "Ryzen 7 5800X", "Ryzen 7 5800X3D", "Ryzen 7 7700X", "Ryzen 7 7800X3D",
        "AMD Ryzen 9 3900X", "Ryzen 9 5900X", "Ryzen 9 5950X", "Ryzen 9 7900X", "Ryzen 9 7950X", "Ryzen 9 7950X3D"
    ];
    
    const MB_DB = ["H61", "B75", "H81", "B85", "H97", "Z97", "H110", "B150", "H170", "Z170", "B250", "H270", "Z270", "H310", "B360", "H370", "Z370", "Z390", "B450", "B550", "X470", "X570", "A520", "H610", "B660", "B760", "Z690", "Z790", "X670"];
    const PSU_DB = Array.from({length: 73}, (_, i) => `${200 + i*25}W`);
    const CERT_DB = ["80 Plus White", "80 Plus Bronze", "80 Plus Silver", "80 Plus Gold", "80 Plus Platinum", "80 Plus Titanium"];
    const VRAM_DB = ["1GB", "2GB", "3GB", "4GB", "6GB", "8GB", "10GB", "11GB", "12GB", "16GB", "24GB"];
    const RAM_DB = ["4GB", "8GB", "12GB", "16GB", "24GB", "32GB", "48GB", "64GB"];
    const RAM_FREQ_DB = ["1600MHz", "1866MHz", "2133MHz", "2400MHz", "2666MHz", "2933MHz", "3000MHz", "3200MHz", "3600MHz", "4000MHz", "4800MHz", "5600MHz", "6000MHz", "6400MHz"];
    
    // ИГРЫ (уникальный список, без дубликатов)
    const GAMES_LIST = [
        "Cyberpunk 2077", "CS2", "Fortnite", "Apex Legends", "Valorant", "League of Legends", "Dota 2",
        "Minecraft", "GTA V", "Red Dead Redemption 2", "The Witcher 3", "Call of Duty Warzone", "Battlefield 2042",
        "Starfield", "Elden Ring", "Baldur's Gate 3", "Hogwarts Legacy", "Rainbow Six Siege", "Overwatch 2", "PUBG",
        "World of Warcraft", "Assassin's Creed Valhalla", "Far Cry 6", "God of War", "Spider-Man Remastered",
        "Horizon Zero Dawn", "Forza Horizon 5", "Microsoft Flight Simulator", "Alan Wake 2", "Resident Evil 4 Remake",
        "Diablo IV", "Helldivers 2", "Dragon's Dogma 2", "Tekken 8", "Street Fighter 6", "Halo Infinite",
        "Atomic Heart", "Dead Space Remake", "Returnal", "Ghostwire Tokyo", "Deathloop"
    ];
    
    // ========== РЕАЛИСТИЧНЫЙ АЛГОРИТМ ОЦЕНКИ (НА ОСНОВЕ РЕАЛЬНЫХ БЕНЧМАРКОВ) ==========
    
    // База производительности видеокарт (реальные данные)
    function getGpuScore(gpu) {
        if (!gpu || gpu.includes("Нету") || gpu.includes("HD Graphics") || gpu.includes("UHD") || (gpu.includes("Vega") && !gpu.includes("Vega 8"))) return 8;
        
        const gpuBenchmarks = {
            "GT 710": 5, "GT 730": 8, "GT 1030": 18, "GTX 750 Ti": 22, "GTX 950": 28, "GTX 960": 36,
            "GTX 970": 52, "GTX 980": 66, "GTX 980 Ti": 78, "GTX 1050": 30, "GTX 1050 Ti": 36,
            "GTX 1060": 48, "GTX 1070": 64, "GTX 1080": 80, "GTX 1080 Ti": 94, "GTX 1650": 44,
            "GTX 1660": 62, "GTX 1660 Super": 70, "GTX 1660 Ti": 74, "RTX 2060": 78, "RTX 2060 Super": 84,
            "RTX 2070": 88, "RTX 2070 Super": 92, "RTX 2080": 98, "RTX 2080 Super": 102, "RTX 2080 Ti": 108,
            "RTX 3050": 66, "RTX 3060": 84, "RTX 3060 Ti": 92, "RTX 3070": 98, "RTX 3070 Ti": 104,
            "RTX 3080": 112, "RTX 3080 Ti": 118, "RTX 3090": 124, "RTX 4060": 88, "RTX 4060 Ti": 96,
            "RTX 4070": 108, "RTX 4070 Ti": 116, "RTX 4080": 128, "RTX 4080 Super": 132, "RTX 4090": 148,
            "RX 550": 18, "RX 560": 26, "RX 570": 48, "RX 580": 54, "RX 590": 60, "RX 5500 XT": 60,
            "RX 5600 XT": 74, "RX 5700": 80, "RX 5700 XT": 88, "RX 6400": 38, "RX 6500 XT": 50,
            "RX 6600": 78, "RX 6600 XT": 86, "RX 6650 XT": 90, "RX 6700 XT": 96, "RX 6750 XT": 100,
            "RX 6800": 108, "RX 6800 XT": 116, "RX 6900 XT": 122, "RX 7600": 82, "RX 7700 XT": 104,
            "RX 7800 XT": 114, "RX 7900 GRE": 120, "RX 7900 XT": 128, "RX 7900 XTX": 136,
            "Arc A380": 30, "Arc A750": 76, "Arc A770": 82
        };
        
        for (let [key, val] of Object.entries(gpuBenchmarks)) {
            if (gpu.includes(key)) return val;
        }
        return 30;
    }
    
    // База производительности процессоров
    function getCpuScore(cpu) {
        if (!cpu) return 20;
        if (cpu.includes("Celeron") || cpu.includes("Pentium")) return 12;
        if (cpu.includes("i3")) {
            if (cpu.includes("12") || cpu.includes("13")) return 70;
            if (cpu.includes("10") || cpu.includes("11")) return 60;
            if (cpu.includes("8") || cpu.includes("9")) return 50;
            return 40;
        }
        if (cpu.includes("i5")) {
            if (cpu.includes("13") || cpu.includes("14")) return 92;
            if (cpu.includes("12")) return 86;
            if (cpu.includes("11")) return 78;
            if (cpu.includes("10")) return 72;
            return 64;
        }
        if (cpu.includes("i7")) {
            if (cpu.includes("14") || cpu.includes("13")) return 102;
            if (cpu.includes("12")) return 96;
            return 84;
        }
        if (cpu.includes("i9")) return 108;
        if (cpu.includes("Ryzen 3")) return 48;
        if (cpu.includes("Ryzen 5")) {
            if (cpu.includes("X3D") || cpu.includes("7600")) return 86;
            return 72;
        }
        if (cpu.includes("Ryzen 7")) {
            if (cpu.includes("X3D")) return 102;
            return 90;
        }
        if (cpu.includes("Ryzen 9")) return 106;
        return 30;
    }
    
    function getRamScore(ramStr) {
        let gb = parseInt(ramStr) || 0;
        if (gb >= 32) return 100;
        if (gb >= 16) return 85;
        if (gb >= 8) return 60;
        return 30;
    }
    
    // Умный расчет FPS для конкретной игры
    function calculateFPS(game, gpuScore, cpuScore, ramScore) {
        const basePerformance = gpuScore * 0.55 + cpuScore * 0.35 + ramScore * 0.1;
        
        // Коэффициенты для разных игр (на основе реальных данных)
        const gameProfiles = {
            "cyberpunk 2077": { low: 0.52, medium: 0.38, high: 0.25 },
            "cs2": { low: 1.85, medium: 1.45, high: 1.05 },
            "fortnite": { low: 1.25, medium: 0.95, high: 0.72 },
            "valorant": { low: 2.15, medium: 1.70, high: 1.25 },
            "apex legends": { low: 1.18, medium: 0.88, high: 0.64 },
            "dota 2": { low: 1.55, medium: 1.20, high: 0.90 },
            "minecraft": { low: 2.30, medium: 1.90, high: 1.50 },
            "gta v": { low: 1.02, medium: 0.78, high: 0.58 },
            "red dead redemption 2": { low: 0.68, medium: 0.52, high: 0.38 },
            "the witcher 3": { low: 0.92, medium: 0.72, high: 0.52 },
            "call of duty warzone": { low: 0.82, medium: 0.62, high: 0.46 },
            "battlefield 2042": { low: 0.78, medium: 0.58, high: 0.42 },
            "starfield": { low: 0.54, medium: 0.40, high: 0.28 },
            "elden ring": { low: 0.88, medium: 0.68, high: 0.50 },
            "baldur's gate 3": { low: 0.90, medium: 0.70, high: 0.52 },
            "forza horizon 5": { low: 1.08, medium: 0.84, high: 0.62 },
            "hogwarts legacy": { low: 0.75, medium: 0.55, high: 0.40 }
        };
        
        let profile = { low: 0.82, medium: 0.62, high: 0.46 };
        const gameLower = game.toLowerCase();
        
        for (let [key, val] of Object.entries(gameProfiles)) {
            if (gameLower.includes(key)) {
                profile = val;
                break;
            }
        }
        
        return {
            low: Math.max(12, Math.floor(basePerformance * profile.low)),
            medium: Math.max(10, Math.floor(basePerformance * profile.medium)),
            high: Math.max(8, Math.floor(basePerformance * profile.high))
        };
    }
    
    // ========== СОСТОЯНИЕ ==========
    let config = { videocard: "", vram: "", ram: "", ramFreq: "", cpu: "", motherboard: "", psu: "", psuCert: "" };
    let activeMode = "games";
    
    function updateConfig(id, val) {
        config[id] = val;
        const span = document.getElementById(`selected-${id}`);
        if (span) span.innerText = val || "не выбрано";
        refreshResultPanel();
    }
    
    window.selectSuggestion = (id, val) => {
        const input = document.getElementById(`input-${id}`);
        if (input) input.value = val;
        updateConfig(id, val);
        updateSuggestions(id);
    };
    
    function updateSuggestions(id) {
        const input = document.getElementById(`input-${id}`);
        const query = input?.value?.trim() || "";
        let db = [];
        if (id === "videocard") db = GPU_DB;
        else if (id === "vram") db = VRAM_DB;
        else if (id === "ram") db = RAM_DB;
        else if (id === "ramFreq") db = RAM_FREQ_DB;
        else if (id === "cpu") db = CPU_DB;
        else if (id === "motherboard") db = MB_DB;
        else if (id === "psu") db = PSU_DB;
        else if (id === "psuCert") db = CERT_DB;
        
        let filtered = db;
        if (query) {
            filtered = db.filter(item => item.toLowerCase().includes(query.toLowerCase()));
        }
        if (filtered.length === 0 && query) filtered = [query];
        if (filtered.length > 12) filtered = filtered.slice(0, 12);
        
        const container = document.getElementById(`suggest-${id}`);
        if (container) {
            container.innerHTML = filtered.map(s => `<div class="suggest-badge" onclick="selectSuggestion('${id}', '${s.replace(/'/g, "\\'")}')">${escapeHtml(s)}</div>`).join("");
            if (filtered.length === 0) container.innerHTML = '<span style="font-size:0.7rem; color:#94a3b8;">💡 начните вводить...</span>';
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function renderComponents() {
        const comps = [
            { id: "videocard", label: "Видеокарта", icon: "fa-tv" },
            { id: "vram", label: "Видеопамять", icon: "fa-memory" },
            { id: "ram", label: "Оперативная память", icon: "fa-microchip" },
            { id: "ramFreq", label: "Частота ОЗУ", icon: "fa-gauge-high" },
            { id: "cpu", label: "Процессор", icon: "fa-microchip" },
            { id: "motherboard", label: "Материнская плата", icon: "fa-plug" },
            { id: "psu", label: "Блок питания", icon: "fa-bolt" },
            { id: "psuCert", label: "Сертификат БП", icon: "fa-certificate" }
        ];
        
        const grid = document.getElementById("componentsGrid");
        grid.innerHTML = comps.map(c => `
            <div class="comp-card">
                <div class="comp-title"><i class="fas ${c.icon}"></i> ${c.label}</div>
                <div class="input-group">
                    <input type="text" id="input-${c.id}" placeholder="Введите текст..." autocomplete="off">
                </div>
                <div id="suggest-${c.id}" class="suggest-list"></div>
                <div class="selected-value" id="selected-${c.id}">не выбрано</div>
            </div>
        `).join("");
        
        comps.forEach(c => {
            const inp = document.getElementById(`input-${c.id}`);
            inp.addEventListener("input", () => updateSuggestions(c.id));
            inp.addEventListener("change", () => {
                if (inp.value.trim()) updateConfig(c.id, inp.value.trim());
                else updateConfig(c.id, "");
            });
            updateSuggestions(c.id);
        });
    }
    
    function getGameAnalysis(game) {
        if (!game) return "🎮 Введите название игры или выберите из списка ниже";
        
        const gpuScore = getGpuScore(config.videocard || "");
        const cpuScore = getCpuScore(config.cpu || "");
        const ramScore = getRamScore(config.ram);
        const fps = calculateFPS(game, gpuScore, cpuScore, ramScore);
        
        let verdict = "";
        let recommendation = "";
        
        if (fps.low >= 70) {
            verdict = "🔥 Отлично! Игра будет работать на максимальных настройках";
            recommendation = "Можете смело выставлять высокие/ультра настройки. Рекомендуется включить DLSS/FSR для дополнительного запаса производительности.";
        } else if (fps.low >= 50) {
            verdict = "👍 Хорошо! Комфортная игра на высоких настройках";
            recommendation = "Рекомендуются высокие настройки. Для стабильных 60+ FPS можно немного снизить качество теней и сглаживания.";
        } else if (fps.low >= 35) {
            verdict = "⚠️ Средний результат. Игра будет работать на средних настройках";
            recommendation = "Оптимальные настройки: средние текстуры, низкие тени, отключенное сглаживание. Включите FSR/DLSS в режиме 'Качество'.";
        } else if (fps.low >= 25) {
            verdict = "⚠️ Минимальные требования. Только низкие настройки";
            recommendation = "Выставьте все настройки на минимум, разрешение 720p, отключите все визуальные эффекты. Рассмотрите апгрейд видеокарты.";
        } else {
            verdict = "❌ К сожалению, ваша сборка не тянет эту игру";
            recommendation = "Для комфортной игры требуется апгрейд. В первую очередь замените видеокарту на более мощную (минимум RTX 3060 / RX 6600).";
        }
        
        return `
            <h3><i class="fas fa-gamepad"></i> ${escapeHtml(game)}</h3>
            <div class="fps-metrics">
                <div style="font-weight:600; margin-bottom:8px;">🎮 Прогноз производительности:</div>
                <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;">
                    <div>📉 Низкие: <strong style="font-size:1.3rem; color:#2c7da0;">${fps.low} FPS</strong></div>
                    <div>📊 Средние: <strong style="font-size:1.3rem; color:#2c7da0;">${fps.medium} FPS</strong></div>
                    <div>📈 Высокие: <strong style="font-size:1.3rem; color:#2c7da0;">${fps.high} FPS</strong></div>
                </div>
                <div style="margin-top:12px; padding-top:8px; border-top:1px solid #e2e8f0;">
                    <strong>⭐ Оценка:</strong> ${verdict}
                </div>
            </div>
            <div>
                <strong>🔧 Рекомендации по настройке:</strong><br>
                ${recommendation}<br><br>
                <strong>⚡ Советы по оптимизации:</strong><br>
                • Обновите драйверы видеокарты до последней версии<br>
                • В панели управления NVIDIA/AMD выберите режим "Максимальная производительность"<br>
                • Закройте фоновые приложения (браузер, Discord) для освобождения ОЗУ<br>
                • Установите приоритет игры в диспетчере задач на "Высокий"
            </div>
        `;
    }
    
    function getUpgradeRecommendation(budget) {
        const gpuScore = getGpuScore(config.videocard || "");
        const cpuScore = getCpuScore(config.cpu || "");
        const ramGB = parseInt(config.ram) || 0;
        let recommendations = [];
        
        if (budget >= 35000 && gpuScore < 95) {
            recommendations.push("🎮 Видеокарта → RTX 4070 / RX 7800 XT (прирост производительности +80-100%)");
        } else if (budget >= 25000 && gpuScore < 80) {
            recommendations.push("🎮 Видеокарта → RTX 4060 Ti / RX 7700 XT (прирост +60-70%)");
        } else if (budget >= 15000 && gpuScore < 65) {
            recommendations.push("🎮 Видеокарта → RTX 3060 / RX 6600 XT (прирост +50-60%)");
        } else if (budget >= 10000 && gpuScore < 55) {
            recommendations.push("🎮 Видеокарта → GTX 1660 Super / RX 5600 XT (прирост +40%)");
        }
        
        if (budget >= 20000 && cpuScore < 75) {
            recommendations.push("💻 Процессор + материнская плата → Ryzen 5 7600 / i5-13400F (прирост +50-70%)");
        } else if (budget >= 12000 && cpuScore < 65) {
            recommendations.push("💻 Процессор → Ryzen 5 5600 / i5-12400F (прирост +40-50%)");
        } else if (budget >= 7000 && cpuScore < 55 && config.cpu.includes("i3")) {
            recommendations.push("💻 Процессор → i5-9400F / Ryzen 5 3600 (если материнская плата поддерживает)");
        }
        
        if (budget >= 5000 && ramGB < 16) {
            recommendations.push("🧠 Оперативная память → добавить планку до 16-32 ГБ (ускорит работу системы и снизит фризы)");
        }
        
        if (budget >= 4000 && (!config.psuCert || config.psuCert.includes("White"))) {
            recommendations.push("🔌 Блок питания → заменить на 80 Plus Gold (обеспечит стабильность и безопасность компонентов)");
        }
        
        if (recommendations.length === 0 && budget > 0) {
            recommendations.push("✅ Ваша сборка отлично сбалансирована! Рекомендуем копить на следующее поколение видеокарт.");
        }
        
        if (budget === 0) {
            recommendations = ["💰 Введите бюджет в рублях для получения персонализированных рекомендаций по апгрейду"];
        }
        
        return `
            <div>
                <strong>💡 Рекомендации по апгрейду</strong>
                <div style="margin-top:8px; color:#475569;">Бюджет: ${budget > 0 ? budget + " ₽" : "не указан"}</div>
                <ul style="margin-top:12px;">
                    ${recommendations.map(r => `<li style="margin-top:8px;">${r}</li>`).join("")}
                </ul>
                <div style="margin-top:16px; padding:12px; background:#f1f5f9; border-radius:12px;">
                    <i class="fas fa-lightbulb"></i> <strong>Совет:</strong> При апгрейде сначала обновляйте видеокарту — это даёт наибольший прирост в играх.
                </div>
            </div>
        `;
    }
    
    function getSystemRating() {
        const gpuScore = getGpuScore(config.videocard || "");
        const cpuScore = getCpuScore(config.cpu || "");
        const ramScore = getRamScore(config.ram);
        const total = Math.min(100, Math.floor(gpuScore * 0.45 + cpuScore * 0.35 + ramScore * 0.2));
        
        let verdict = "";
        let color = "";
        if (total >= 85) {
            verdict = "🔥 Флагманская сборка! Отлично справляется с любыми играми в 1440p/4K";
            color = "#15803d";
        } else if (total >= 70) {
            verdict = "👍 Отличная современная сборка. Комфортный гейминг в 1080p на высоких настройках";
            color = "#2c7da0";
        } else if (total >= 55) {
            verdict = "⚖️ Средний уровень. Большинство игр на средних настройках, для новых AAA требуется оптимизация";
            color = "#b45309";
        } else {
            verdict = "⚠️ Сборка устарела. Рекомендуется апгрейд для современных игр";
            color = "#b91c1c";
        }
        
        const strengths = [];
        const weaknesses = [];
        
        if (gpuScore >= 70) strengths.push("🎮 Видеокарта высокого уровня");
        else if (gpuScore < 45) weaknesses.push("🎮 Видеокарта слабая для современных игр");
        
        if (cpuScore >= 75) strengths.push("💻 Процессор отлично справляется с нагрузками");
        else if (cpuScore < 50) weaknesses.push("💻 Процессор является узким местом");
        
        const ramGB = parseInt(config.ram) || 0;
        if (ramGB >= 32) strengths.push("🧠 Отличный объём оперативной памяти");
        else if (ramGB < 16) weaknesses.push("🧠 Оперативной памяти недостаточно (рекомендуется 16+ ГБ)");
        
        if (config.psuCert && (config.psuCert.includes("Gold") || config.psuCert.includes("Platinum"))) {
            strengths.push("🔌 Качественный блок питания с хорошим сертификатом");
        } else if (config.psuCert && !config.psuCert.includes("Gold")) {
            weaknesses.push("🔌 Рекомендуется заменить БП на 80 Plus Gold");
        }
        
        return `
            <h3><i class="fas fa-star"></i> Общая оценка системы: ${total}/100</h3>
            <p style="margin-top:8px; font-weight:600; color:${color};">${verdict}</p>
            
            ${strengths.length > 0 ? `
            <div style="margin-top:16px;">
                <strong><i class="fas fa-check-circle" style="color:#15803d;"></i> Сильные стороны:</strong>
                <ul style="margin-top:6px;">${strengths.map(s => `<li>${s}</li>`).join("")}</ul>
            </div>
            ` : ""}
            
            ${weaknesses.length > 0 ? `
            <div style="margin-top:12px;">
                <strong><i class="fas fa-exclamation-triangle" style="color:#b45309;"></i> Узкие места:</strong>
                <ul style="margin-top:6px;">${weaknesses.map(w => `<li>${w}</li>`).join("")}</ul>
            </div>
            ` : ""}
            
            <div class="badge-status" style="margin-top:16px; display:block;">
                <i class="fas fa-broom"></i> <strong>Рекомендации по обслуживанию:</strong><br>
                • Чистка от пыли каждые 3-6 месяцев<br>
                • Замена термопасты на процессоре и видеокарте каждые 2 года<br>
                • Регулярное обновление драйверов и BIOS<br>
                • Мониторинг температур через HWMonitor или MSI Afterburner
            </div>
        `;
    }
    
    function refreshResultPanel() {
        const panel = document.getElementById("dynamicContent");
        if (!panel) return;
        
        if (activeMode === "games") {
            panel.innerHTML = `
                <div class="game-input-area">
                    <input type="text" id="gameNameInput" placeholder="Введите название игры..." list="gameList" autocomplete="off">
                    <datalist id="gameList">${GAMES_LIST.map(g => `<option value="${g}">`).join("")}</datalist>
                    <button id="analyzeGameBtn"><i class="fas fa-chart-line"></i> Анализировать</button>
                </div>
                <div class="game-suggestions">
                    ${GAMES_LIST.map(g => `<div class="game-chip" data-game="${escapeHtml(g)}">${escapeHtml(g)}</div>`).join("")}
                </div>
                <div id="gameResult">🎮 Выберите игру из списка или введите название для анализа</div>
            `;
            
            const analyzeBtn = document.getElementById("analyzeGameBtn");
            if (analyzeBtn) {
                analyzeBtn.onclick = () => {
                    const game = document.getElementById("gameNameInput")?.value || "";
                    const resultDiv = document.getElementById("gameResult");
                    if (resultDiv) resultDiv.innerHTML = getGameAnalysis(game);
                };
            }
            
            document.querySelectorAll(".game-chip").forEach(chip => {
                chip.onclick = () => {
                    const game = chip.getAttribute("data-game");
                    const input = document.getElementById("gameNameInput");
                    if (input) input.value = game;
                    const resultDiv = document.getElementById("gameResult");
                    if (resultDiv) resultDiv.innerHTML = getGameAnalysis(game);
                };
            });
        } else if (activeMode === "upgrade") {
            panel.innerHTML = `
                <div class="upgrade-budget">
                    <input type="number" id="budgetAmount" class="budget-input" placeholder="Введите бюджет в рублях (например, 20000)">
                    <button id="applyBudgetBtn">Подобрать апгрейд</button>
                </div>
                <div id="upgradeResult">📊 Нажмите "Подобрать" для получения персонализированных рекомендаций</div>
            `;
            
            const budgetBtn = document.getElementById("applyBudgetBtn");
            if (budgetBtn) {
                budgetBtn.onclick = () => {
                    const budget = parseInt(document.getElementById("budgetAmount")?.value) || 0;
                    const resultDiv = document.getElementById("upgradeResult");
                    if (resultDiv) resultDiv.innerHTML = getUpgradeRecommendation(budget);
                };
            }
        } else if (activeMode === "overall") {
            panel.innerHTML = getSystemRating();
        }
    }
    
    function initModeSwitcher() {
        const btns = document.querySelectorAll(".mode-btn");
        btns.forEach(btn => {
            btn.addEventListener("click", () => {
                btns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                activeMode = btn.getAttribute("data-mode");
                refreshResultPanel();
            });
        });
        document.querySelector(".mode-btn[data-mode='games']")?.classList.add("active");
        refreshResultPanel();
    }
    
    renderComponents();
    initModeSwitcher();
</script>
</body>
</html>
